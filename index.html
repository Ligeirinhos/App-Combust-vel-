<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivvo - Controle da Moto</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23e63946'/%3E%3Ctext y='.75em' font-size='60' x='50%25' text-anchor='middle'%3E🏍️%3C/text%3E%3C/svg%3E">
    <meta name="theme-color" content="#000000">
    <style>
        :root { --bg:#000; --card:#111; --primary:#e63946; --secondary:#f4a261; --text:#fff; --gold:#ffc107; --border:#333; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',Arial,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:12px; }
        .container { max-width:800px; margin:0 auto; }
        h1 { text-align:center; color:var(--primary); margin-bottom:5px; font-size:1.5em; }
        .subtitle { text-align:center; color:var(--secondary); font-size:0.85em; margin-bottom:12px; }
        .tabs { display:flex; gap:4px; margin-bottom:12px; flex-wrap:wrap; }
        .tab { flex:1; padding:8px 6px; background:var(--card); border:2px solid transparent; color:var(--text); cursor:pointer; border-radius:8px; font-size:0.8em; text-align:center; transition:0.2s; }
        .tab.active { border-color:var(--primary); background:var(--primary); color:white; font-weight:bold; }
        .tab-content { display:none; } .tab-content.active { display:block; }
        .card { background:var(--card); border-radius:12px; padding:15px; margin-bottom:12px; border:1px solid var(--border); }
        .auth-section { max-width:350px; margin:40px auto; background:var(--card); padding:20px; border-radius:12px; border:1px solid var(--border); }
        .auth-section input { width:100%; padding:10px; margin:6px 0; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; }
        .auth-section button { width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:8px; }
        .auth-section .toggle { background:none; color:var(--secondary); text-decoration:underline; margin-top:4px; }
        .dashboard { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
        .dash-item { background:var(--card); padding:12px; border-radius:10px; text-align:center; border:1px solid var(--border); }
        .dash-item .number { font-size:1.6em; font-weight:bold; color:var(--gold); }
        .dash-item .label { font-size:0.8em; color:var(--secondary); margin-top:4px; }
        .resumo-section { margin-bottom:15px; }
        .resumo-section h3 { color:var(--secondary); margin-bottom:8px; }
        .resumo-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:8px; }
        .resumo-card { background:var(--bg); border-radius:10px; padding:10px; text-align:center; border:1px solid var(--border); }
        .resumo-card .valor { font-size:1.2em; font-weight:bold; }
        .resumo-card .periodo { font-size:0.7em; color:var(--secondary); }
        .ganho .valor { color:#2ecc71; } .gasto .valor { color:var(--primary); } .saldo .valor { color:var(--gold); }
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .form-group { margin-bottom:6px; } .form-group.full { grid-column:1/-1; }
        .form-group label { display:block; font-size:0.75em; color:var(--secondary); margin-bottom:2px; }
        .form-group input, .form-group select { width:100%; padding:7px 8px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:8px; font-size:0.85em; }
        .checkbox-group { display:flex; align-items:center; gap:6px; }
        .checkbox-group input[type="checkbox"] { width:16px; height:16px; accent-color:var(--primary); }
        .btn { padding:7px 14px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; font-size:0.85em; transition:0.2s; margin:3px; }
        .btn-primary { background:var(--primary); color:white; } .btn-primary:hover { opacity:0.9; }
        .btn-secondary { background:var(--secondary); color:black; } .btn-secondary:hover { opacity:0.9; }
        .btn-outline { background:transparent; border:1px solid var(--primary); color:var(--primary); }
        .btn-small { padding:4px 10px; font-size:0.75em; }
        .empty-state { text-align:center; opacity:0.5; padding:15px; }
        .total-geral { text-align:center; font-size:1em; color:var(--gold); margin-bottom:12px; }
        .edit-form { background:var(--card); padding:12px; border-radius:8px; margin-top:8px; border:1px solid var(--border); }
        .edit-form input, .edit-form select { width:100%; margin:4px 0; }
        .categoria-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
        .btn-delete-cat { background:none; border:none; color:#ef4444; font-size:18px; cursor:pointer; }
        .add-cat-form { display:flex; gap:8px; margin-top:10px; }
        .add-cat-form input { flex:1; }
        .logout { float:right; background:none; border:1px solid var(--primary); color:var(--primary); padding:4px 12px; border-radius:6px; cursor:pointer; font-size:0.8em; }

        /* Timeline */
        .timeline { position: relative; padding-left: 30px; }
        .timeline::before { content: ''; position: absolute; left: 15px; top: 0; bottom: 0; width: 2px; background: var(--border); }
        .timeline-item { position: relative; margin-bottom: 20px; }
        .timeline-item::before {
            content: ''; position: absolute; left: -22px; top: 5px;
            width: 12px; height: 12px; border-radius: 50%; background: var(--secondary);
            border: 2px solid var(--bg);
        }
        .timeline-item.abastecimento::before { background: var(--primary); }
        .timeline-item.despesa::before { background: var(--gold); }
        .timeline-item.receita::before { background: #2ecc71; }
        .timeline-content {
            background: var(--card); border-radius: 8px; padding: 10px;
            border: 1px solid var(--border);
        }
        .timeline-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
        .timeline-info strong { color: var(--secondary); display:block; }
    </style>
</head>
<body>
    <div class="container" id="appContainer">
        <div id="authScreen" class="auth-section">
            <h2 style="color:var(--primary);text-align:center;">🏍️ Drivvo - Moto</h2>
            <p style="text-align:center;color:var(--secondary);">Faça login para acessar seus dados</p>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="password" placeholder="Senha">
            <button class="btn-primary" id="btnLogin">Entrar</button>
            <button class="toggle" id="btnToggle">Criar uma conta</button>
            <p id="authError" style="color:#e63946;text-align:center;display:none;"></p>
        </div>

        <div id="mainScreen" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>🏍️ Drivvo - Moto</h1>
                <button class="logout" id="btnLogout">Sair</button>
            </div>
            <p class="subtitle">Controle de abastecimentos, despesas e receitas</p>

            <div class="tabs">
                <button class="tab active" data-tab="historico">📋 Histórico</button>
                <button class="tab" data-tab="dashboard">📊 Dashboard</button>
                <button class="tab" data-tab="novo">➕ Novo</button>
                <button class="tab" data-tab="lembretes">🔔 Lembretes</button>
                <button class="tab" data-tab="categorias">⚙️ Categorias</button>
            </div>

            <!-- Histórico com timeline -->
            <div class="tab-content active" id="tab-historico">
                <div class="card">
                    <h2>📋 Linha do Tempo</h2>
                    <div class="total-geral" id="totalGeral"></div>
                    <div class="timeline" id="timelineContainer"></div>
                </div>
            </div>

            <!-- Dashboard permanece exatamente igual ao código anterior -->
            <div class="tab-content" id="tab-dashboard">
                <!-- ... (mesmo HTML do dashboard anterior) ... -->
            </div>

            <!-- Abas Novo, Lembretes, Categorias permanecem iguais -->
            <!-- ... -->
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, set, get, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBP-7159WPs1q1lKRtW1c0BHjsLexZYQAM",
            authDomain: "app-automotivo-b7788.firebaseapp.com",
            databaseURL: "https://app-automotivo-b7788-default-rtdb.firebaseio.com",
            projectId: "app-automotivo-b7788",
            storageBucket: "app-automotivo-b7788.firebasestorage.app",
            messagingSenderId: "762136290915",
            appId: "1:762136290915:web:2694eb54769e683c4e3a56"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const VEICULO = 'Moto';
        let currentUser = null;
        let categoriasDespesa = [];
        let categoriasReceita = [];

        const authScreen = document.getElementById('authScreen');
        const mainScreen = document.getElementById('mainScreen');
        const authError = document.getElementById('authError');

        // ========== AUTENTICAÇÃO ==========
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                authScreen.style.display = 'none';
                mainScreen.style.display = 'block';
                iniciarApp();
            } else {
                authScreen.style.display = 'block';
                mainScreen.style.display = 'none';
            }
        });

        document.getElementById('btnLogin').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const isSignUp = document.getElementById('btnToggle').dataset.signup === 'true';
            try {
                if (isSignUp) await createUserWithEmailAndPassword(auth, email, password);
                else await signInWithEmailAndPassword(auth, email, password);
                authError.style.display = 'none';
            } catch (error) {
                authError.textContent = error.message;
                authError.style.display = 'block';
            }
        });

        document.getElementById('btnToggle').addEventListener('click', function() {
            const isSignUp = this.dataset.signup === 'true';
            this.dataset.signup = !isSignUp;
            this.textContent = isSignUp ? 'Criar uma conta' : 'Já tenho conta';
            document.getElementById('btnLogin').textContent = isSignUp ? 'Entrar' : 'Cadastrar';
        });

        document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));

        // ========== INICIAR APÓS LOGIN ==========
        async function iniciarApp() {
            await carregarCategorias();
            renderHistorico();
            configurarAbas();
        }

        function configurarAbas() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabName = tab.dataset.tab;
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(`tab-${tabName}`).classList.add('active');
                    if (tabName === 'dashboard') carregarDashboard();
                    else if (tabName === 'historico') renderHistorico();
                    else if (tabName === 'lembretes') gerarLembretes();
                    else if (tabName === 'categorias') renderizarListaCategorias();
                    else if (tabName === 'novo') atualizarFormulario();
                });
            });
        }

        // ========== CATEGORIAS (mantidas iguais) ==========
        // ... (código das categorias inalterado) ...

        // ========== FORMULÁRIO (mantido igual) ==========
        // ... (código do formulário inalterado) ...

        // ========== SALVAR (mantido igual) ==========
        // ... (código de salvar inalterado) ...

        // ========== HISTÓRICO COM TIMELINE ==========
        window.renderHistorico = async function() {
            if (!currentUser) return;
            const container = document.getElementById('timelineContainer');
            const totalDiv = document.getElementById('totalGeral');
            container.innerHTML = '<p class="empty-state">Carregando...</p>';
            const colecoes = ['abastecimentos', 'despesas', 'receitas'];
            let registros = [];
            for (const col of colecoes) {
                const snap = await get(ref(db, col));
                if (snap.exists()) {
                    snap.forEach(child => {
                        const dados = child.val();
                        if (dados.uid !== currentUser.uid) return;
                        if (dados.veiculo && dados.veiculo !== VEICULO) return;
                        registros.push({ id: child.key, tipoRegistro: col.slice(0,-1), ...dados });
                    });
                }
            }
            registros.sort((a, b) => (a.data < b.data) ? 1 : -1); // mais recente primeiro
            let totalGeral = 0;
            registros.forEach(r => { totalGeral += r.tipoRegistro === 'abastecimento' ? Number(r.valor_total) : Number(r.valor || 0); });
            totalDiv.textContent = registros.length ? `Total geral: R$ ${totalGeral.toFixed(2)} (${registros.length} registros)` : '';
            if (!registros.length) {
                container.innerHTML = '<p class="empty-state">Nenhum registro ainda.</p>';
                return;
            }
            let html = '';
            registros.forEach(r => {
                const classe = r.tipoRegistro;
                const dataFmt = r.data ? new Date(r.data).toLocaleString('pt-BR') : '';
                html += `<div class="timeline-item ${classe}" id="item-${r.id}">
                    <div class="timeline-content">
                        <div class="timeline-header">
                            <div class="timeline-info">
                                <strong>${r.tipoRegistro === 'abastecimento' ? '⛽ Abastecimento' : r.tipoRegistro === 'despesa' ? '💸 Despesa' : '💰 Receita'}</strong>
                                <span>📅 ${dataFmt} - Km: ${r.km}</span>
                            </div>
                            <div>
                                <button class="btn-secondary btn-small" onclick="editarRegistro('${r.tipoRegistro}', '${r.id}')">✏️</button>
                                <button class="btn-outline btn-small" onclick="excluirRegistro('${r.tipoRegistro}', '${r.id}')">🗑️</button>
                            </div>
                        </div>
                        <div style="margin-top:4px;">`;
                if (r.tipoRegistro === 'abastecimento') {
                    html += `🔹 ${r.litros}L - R$ ${Number(r.valor_total).toFixed(2)} - Posto: ${r.posto || '-'}`;
                    if (r.tanque_cheio) html += ' <span class="badge" style="background:var(--primary); color:white; padding:1px 5px; border-radius:4px;">Tanque cheio</span>';
                } else if (r.tipoRegistro === 'despesa') {
                    html += `🔹 ${r.descricao} - R$ ${Number(r.valor).toFixed(2)}`;
                    if (r.categoria) html += ` (${r.categoria})`;
                } else if (r.tipoRegistro === 'receita') {
                    html += `🏢 <strong>${r.tipo || 'Receita'}</strong> - R$ ${Number(r.valor).toFixed(2)} - Km: ${r.km}`;
                }
                html += `</div><div id="edit-${r.id}" class="edit-form" style="display:none;"></div></div></div>`;
            });
            container.innerHTML = html;
        };

        // ========== EDITAR / EXCLUIR (mantidos iguais) ==========
        // ... (código de editar/excluir inalterado) ...

        // ========== DASHBOARD (mantido igual) ==========
        // ... (código do dashboard inalterado) ...

        // ========== LEMBRETES (mantido igual) ==========
        // ... (código dos lembretes inalterado) ...
    </script>
</body>
</html>
