<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste Drivvo</title>
    <style>
        .tab-content { display: none; } .tab-content.active { display: block; }
    </style>
</head>
<body>
    <h1>🏍️ Teste de Abas</h1>
    <button class="tab active" data-tab="historico">Histórico</button>
    <button class="tab" data-tab="dashboard">Dashboard</button>

    <div class="tab-content active" id="tab-historico"><p>📋 Histórico funcionando!</p></div>
    <div class="tab-content" id="tab-dashboard"><p>📊 Dashboard funcionando!</p></div>

    <script>
        alert('✅ Script carregado!');
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`tab-${tabName}`).classList.add('active');
                alert('Aba ' + tabName + ' ativada!');
            });
        });
    </script>
</body>
</html>
