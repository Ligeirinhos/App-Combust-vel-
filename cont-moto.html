<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioCar Pro - Gestão Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .btn-gradient { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24">

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center">
            <div class="text-5xl mb-4">🚗</div>
            <h1 class="text-2xl font-bold text-gray-800 mb-6">BioCar Pro</h1>
            <input type="email" id="email" placeholder="E-mail" class="w-full p-3 mb-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password" placeholder="Senha" class="w-full p-3 mb-6 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="handleAuth()" class="w-full btn-gradient text-white py-3 rounded-xl font-bold shadow-lg">Entrar / Cadastrar</button>
            <p id="auth-msg" class="text-red-500 text-sm mt-4"></p>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app-content" class="hidden">
        <!-- Header -->
        <header class="btn-gradient text-white p-6 rounded-b-[40px] shadow-2xl sticky top-0 z-10">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-blue-100 text-xs">Bem-vindo,</p>
                    <h2 id="user-display" class="font-bold">Motorista</h2>
                </div>
                <button onclick="logout()" class="bg-white/20 p-2 rounded-full"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <div class="mt-6 bg-white/10 p-4 rounded-2xl">
                <p class="text-xs text-blue-100 uppercase tracking-wider text-center">Gasto Total Acumulado</p>
                <p id="total-geral" class="text-4xl font-bold text-center mt-1 text-white">R$ 0,00</p>
            </div>
        </header>

        <main class="p-4 space-y-6">
            <!-- Gráfico -->
            <div class="bg-white p-4 rounded-3xl shadow-sm">
                <h3 class="text-gray-500 text-xs font-bold mb-4 uppercase">Distribuição de Gastos</h3>
                <canvas id="chartGastos" height="150"></canvas>
            </div>

            <!-- Formulário Rapidão -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-blue-50">
                <h3 class="font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fas fa-plus-circle text-blue-500 mr-2"></i> Nova Despesa
                </h3>
                <div class="space-y-3">
                    <input type="text" id="desc" placeholder="Ex: Troca de óleo" class="w-full p-3 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">
                    <div class="flex gap-2">
                        <input type="number" id="valor" placeholder="Valor R$" class="w-1/2 p-3 bg-gray-50 border-none rounded-xl outline-none">
                        <select id="categoriaDespesa" class="w-1/2 p-3 bg-gray-50 border-none rounded-xl outline-none text-gray-500">
                            <!-- Preenchido via JavaScript com as categorias do Firebase -->
                        </select>
                    </div>
                    <button onclick="salvarGasto()" class="w-full btn-gradient text-white py-3 rounded-xl font-bold">Salvar</button>
                </div>
            </div>

            <!-- Lista de Histórico -->
            <div class="space-y-3 pb-10">
                <div class="flex justify-between items-center px-2">
                    <h3 class="font-bold text-gray-700">Histórico</h3>
                    <span class="text-xs text-blue-500 font-bold">Ver tudo</span>
                </div>
                <div id="lista-gastos" class="space-y-3">
                    <!-- Gerado via JS -->
                </div>
            </div>
        </main>

        <!-- Menu Navegação -->
        <nav class="fixed bottom-0 w-full bg-white/80 backdrop-blur-md border-t flex justify-around p-4 shadow-2xl">
            <button class="text-blue-600"><i class="fas fa-home text-xl"></i></button>
            <button class="text-gray-400" onclick="alert('Relatórios Detalhados em breve')"><i class="fas fa-chart-line text-xl"></i></button>
            <button class="text-gray-400" onclick="alert('Garagem: Gerencie seus carros')"><i class="fas fa-car text-xl"></i></button>
        </nav>
    </div>

    <!-- LÓGICA FIREBASE (INTEGRADA COM O CONTROLE DA MOTO) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // Configuração completa (do Controle da Moto)
        const firebaseConfig = {
            apiKey: "AIzaSyBP-7159WPs1q1lKRtW1c0BHjsLexZYQAM",
            authDomain: "app-automotivo-b7788.firebaseapp.com",
            databaseURL: "https://app-automotivo-b7788-default-rtdb.firebaseio.com",
            projectId: "app-automotivo-b7788",
            storageBucket: "app-automotivo-b7788.firebasestorage.app",
            messagingSenderId: "762136290915",
            appId: "1:762136290915:web:2694eb54769e683c4e3a56"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;
        let chartInstance = null;
        let todasCategoriasDespesa = [];

        // ==================== AUTENTICAÇÃO ====================
        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('auth-msg');

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    try {
                        await createUserWithEmailAndPassword(auth, email, password);
                    } catch (e) {
                        msg.innerText = "Erro ao criar conta: " + e.message;
                    }
                } else {
                    msg.innerText = "Erro ao entrar: " + error.message;
                }
            }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email.split('@')[0];
                carregarDados();
                carregarCategoriasDespesa();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        // ==================== CARREGAR CATEGORIAS ====================
        async function carregarCategoriasDespesa() {
            const snap = await get(ref(db, 'categoriasDespesas'));
            if (snap.exists()) {
                todasCategoriasDespesa = Object.values(snap.val());
            } else {
                // Categorias padrão caso não existam no banco
                todasCategoriasDespesa = ['Troca de óleo', 'Troca de pneu', 'Mecânico', 'Revisão', 'Seguro', 'Lavagem', 'Outros'];
            }
            const select = document.getElementById('categoriaDespesa');
            select.innerHTML = todasCategoriasDespesa.map(cat => `<option value="${cat}">${cat}</option>`).join('');
        }

        // ==================== SALVAR GASTO (em despesas) ====================
        window.salvarGasto = () => {
            const desc = document.getElementById('desc').value.trim();
            const valor = parseFloat(document.getElementById('valor').value);
            const categoria = document.getElementById('categoriaDespesa').value;

            if (!desc || isNaN(valor) || valor <= 0) {
                alert("Preencha a descrição e um valor válido (maior que 0)");
                return;
            }

            const data = new Date().toISOString(); // formato ISO para compatibilidade
            const km = 0; // opcional, pois o BioCar não pede km

            push(ref(db, 'despesas'), {
                uid: currentUser.uid,
                veiculo: 'Moto', // pode ser genérico
                data: data,
                km: km,
                valor: valor,
                descricao: desc,
                categoria: categoria
            });

            document.getElementById('desc').value = '';
            document.getElementById('valor').value = '';
        };

        // ==================== EXCLUIR GASTO ====================
        window.excluirGasto = (colecao, id) => {
            if (!confirm("Deseja apagar este registro?")) return;
            remove(ref(db, `${colecao}/${id}`));
        };

        // ==================== CARREGAR DADOS (ABASTECIMENTOS + DESPESAS) ====================
        function carregarDados() {
            if (!currentUser) return;

            // Ouvir as três coleções e consolidar
            const colecoes = ['abastecimentos', 'despesas', 'receitas'];
            // Para cada coleção, usar onValue para atualizar em tempo real
            // Vamos criar um listener combinado: cada vez que uma mudar, reconsolidamos
            // Para simplificar, usamos uma função que lê todas e consolida.
            // Mas para reatividade, podemos usar um único listener no caminho raiz? Melhor: escutar cada coleção e consolidar.
            // Como são três, faremos uma função que é chamada por cada listener.
            // Vamos usar um contador ou flag para não chamar múltiplas vezes.
            let atualizando = false;

            function consolidar() {
                if (atualizando) return;
                atualizando = true;
                Promise.all([
                    get(ref(db, 'abastecimentos')),
                    get(ref(db, 'despesas')),
                    get(ref(db, 'receitas'))
                ]).then(([snapAbast, snapDesp, snapRec]) => {
                    const registros = [];

                    // Abastecimentos
                    if (snapAbast.exists()) {
                        snapAbast.forEach(child => {
                            const dados = child.val();
                            if (dados.uid !== currentUser.uid) return;
                            if (dados.veiculo && dados.veiculo !== 'Moto') return; // opcional
                            registros.push({
                                id: child.key,
                                colecao: 'abastecimentos',
                                desc: `⛽ Abastecimento${dados.posto ? ' - ' + dados.posto : ''}`,
                                valor: Number(dados.valor_total),
                                tipo: 'Combustível',
                                data: dados.data,
                                // guardar original para excluir
                                _orig: dados
                            });
                        });
                    }

                    // Despesas
                    if (snapDesp.exists()) {
                        snapDesp.forEach(child => {
                            const dados = child.val();
                            if (dados.uid !== currentUser.uid) return;
                            if (dados.veiculo && dados.veiculo !== 'Moto') return;
                            // Mapear categoria para os tipos do BioCar
                            let tipo = 'Outros';
                            const cat = dados.categoria || '';
                            if (cat.includes('óleo') || cat.includes('pneu') || cat.includes('mecânico') || cat.includes('revisão') || cat.includes('seguro')) {
                                tipo = 'Manutenção';
                            } else if (cat.includes('lavagem') || cat.includes('lava')) {
                                tipo = 'Lavagem';
                            }
                            registros.push({
                                id: child.key,
                                colecao: 'despesas',
                                desc: dados.descricao || 'Despesa',
                                valor: Number(dados.valor),
                                tipo: tipo,
                                data: dados.data,
                                _orig: dados
                            });
                        });
                    }

                    // Receitas – ignoramos (não são gastos)
                    // Se quiser exibir, pode descomentar, mas não entram no total
                    
                    // Ordenar por data (mais recente primeiro)
                    registros.sort((a, b) => (a.data < b.data) ? 1 : -1);

                    renderizarLista(registros);
                    atualizarResumo(registros);
                    atualizando = false;
                }).catch(err => {
                    console.error('Erro ao consolidar:', err);
                    atualizando = false;
                });
            }

            // Escutar cada coleção
            const abastRef = ref(db, 'abastecimentos');
            const despRef = ref(db, 'despesas');
            const recRef = ref(db, 'receitas');

            onValue(abastRef, () => consolidar());
            onValue(despRef, () => consolidar());
            onValue(recRef, () => consolidar());

            // Primeira carga
            consolidar();
        }

        // ==================== RENDERIZAR LISTA ====================
        function renderizarLista(registros) {
            const container = document.getElementById('lista-gastos');
            container.innerHTML = '';
            if (!registros || registros.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-10">Nenhum gasto registrado.</p>';
                return;
            }

            registros.forEach(item => {
                const dataFormatada = item.data ? new Date(item.data).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border-l-4 ${getColor(item.tipo)}">
                        <div>
                            <p class="font-bold text-gray-800">${item.desc}</p>
                            <p class="text-[10px] text-gray-400 uppercase font-bold">${dataFormatada} • ${item.tipo}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-blue-600">R$ ${item.valor.toFixed(2)}</p>
                            <button onclick="excluirGasto('${item.colecao}', '${item.id}')" class="text-red-300 text-xs mt-1 hover:text-red-500 transition">Remover</button>
                        </div>
                    </div>
                `;
            });
        }

        function getColor(tipo) {
            const cores = {
                'Combustível': 'border-green-500',
                'Manutenção': 'border-orange-500',
                'Lavagem': 'border-blue-500'
            };
            return cores[tipo] || 'border-gray-500';
        }

        // ==================== RESUMO E GRÁFICO ====================
        function atualizarResumo(registros) {
            let total = 0;
            const categorias = { 'Combustível': 0, 'Manutenção': 0, 'Lavagem': 0, 'Outros': 0 };

            registros.forEach(item => {
                total += item.valor;
                categorias[item.tipo] = (categorias[item.tipo] || 0) + item.valor;
            });

            document.getElementById('total-geral').innerText = `R$ ${total.toFixed(2)}`;
            renderChart(categorias);
        }

        function renderChart(categorias) {
            const ctx = document.getElementById('chartGastos').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            // Filtrar categorias com valor zero para não aparecerem
            const labels = Object.keys(categorias).filter(key => categorias[key] > 0);
            const data = labels.map(key => categorias[key]);
            const colors = {
                'Combustível': '#10b981',
                'Manutenção': '#f59e0b',
                'Lavagem': '#3b82f6',
                'Outros': '#94a3b8'
            };
            const backgroundColors = labels.map(key => colors[key] || '#94a3b8');

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: backgroundColors,
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    plugins: { 
                        legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } }
                    },
                    cutout: '70%'
                }
            });
        }
    </script>
</body>
</html>
