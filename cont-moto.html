<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioCar Pro - Gestão Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f0f2f5; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .btn-gradient { background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-24">

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center">
            <div class="text-5xl mb-4">🚗</div>
            <h1 class="text-2xl font-bold text-gray-800 mb-6">BioCar Pro</h1>
            <input type="email" id="email" placeholder="E-mail" class="w-full p-3 mb-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password" placeholder="Senha" class="w-full p-3 mb-6 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="handleAuth()" class="w-full btn-gradient text-white py-3 rounded-xl font-bold shadow-lg">Entrar / Cadastrar</button>
            <p id="auth-msg" class="text-red-500 text-sm mt-4"></p>
        </div>
    </div>

    <!-- APP PRINCIPAL (OCULTO ANTES DO LOGIN) -->
    <div id="app-content" class="hidden">
        <!-- Header -->
        <header class="btn-gradient text-white p-6 rounded-b-[40px] shadow-2xl sticky top-0 z-10">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-blue-100 text-xs">Bem-vindo,</p>
                    <h2 id="user-display" class="font-bold">Motorista</h2>
                </div>
                <button onclick="logout()" class="bg-white/20 p-2 rounded-full"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            
            <div class="mt-6 bg-white/10 p-4 rounded-2xl">
                <p class="text-xs text-blue-100 uppercase tracking-wider text-center">Gasto Total Acumulado</p>
                <p id="total-geral" class="text-4xl font-bold text-center mt-1 text-white">R$ 0,00</p>
            </div>
        </header>

        <main class="p-4 space-y-6">
            <!-- Gráfico -->
            <div class="bg-white p-4 rounded-3xl shadow-sm">
                <h3 class="text-gray-500 text-xs font-bold mb-4 uppercase">Distribuição de Gastos</h3>
                <canvas id="chartGastos" height="150"></canvas>
            </div>

            <!-- Formulário Rapidão -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-blue-50">
                <h3 class="font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fas fa-plus-circle text-blue-500 mr-2"></i> Novo Registro
                </h3>
                <div class="space-y-3">
                    <input type="text" id="desc" placeholder="Ex: Gasolina Aditivada" class="w-full p-3 bg-gray-50 border-none rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">
                    <div class="flex gap-2">
                        <input type="number" id="valor" placeholder="Valor R$" class="w-1/2 p-3 bg-gray-50 border-none rounded-xl outline-none">
                        <select id="tipo" class="w-1/2 p-3 bg-gray-50 border-none rounded-xl outline-none text-gray-500">
                            <option value="Combustível">⛽ Combustível</option>
                            <option value="Manutenção">🔧 Manutenção</option>
                            <option value="Lavagem">🧼 Lavagem</option>
                            <option value="Outros">📦 Outros</option>
                        </select>
                    </div>
                    <button onclick="salvarGasto()" class="w-full btn-gradient text-white py-3 rounded-xl font-bold">Salvar</button>
                </div>
            </div>

            <!-- Lista de Histórico -->
            <div class="space-y-3 pb-10">
                <div class="flex justify-between items-center px-2">
                    <h3 class="font-bold text-gray-700">Histórico</h3>
                    <span class="text-xs text-blue-500 font-bold">Ver tudo</span>
                </div>
                <div id="lista-gastos" class="space-y-3">
                    <!-- Gerado via JS -->
                </div>
            </div>
        </main>

        <!-- Menu Navegação -->
        <nav class="fixed bottom-0 w-full bg-white/80 backdrop-blur-md border-t flex justify-around p-4 shadow-2xl">
            <button class="text-blue-600"><i class="fas fa-home text-xl"></i></button>
            <button class="text-gray-400" onclick="alert('Relatórios Detalhados em breve')"><i class="fas fa-chart-line text-xl"></i></button>
            <button class="text-gray-400" onclick="alert('Garagem: Gerencie seus carros')"><i class="fas fa-car text-xl"></i></button>
        </nav>
    </div>

    <!-- LOGICA FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

        const firebaseConfig = {
            databaseURL: "https://app-automotivo-b7788-default-rtdb.firebaseio.com",
            projectId: "app-automotivo-b7788",
            storageBucket: "app-automotivo-b7788.firebasestorage.app",
            messagingSenderId: "762136290915",
            appId: "1:762136290915:web:2694eb54769e683c4e3a56"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUser = null;
        let chartInstance = null;

        // AUTH HANDLER (Entrar ou Criar conta automaticamente)
        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('auth-msg');

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    await createUserWithEmailAndPassword(auth, email, password);
                } else {
                    msg.innerText = "Erro ao entrar. Verifique os dados.";
                }
            }
        };

        window.logout = () => signOut(auth);

        // OBSERVAR ESTADO DO USUARIO
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email.split('@')[0];
                carregarDados();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
            }
        });

        // SALVAR GASTO
        window.salvarGasto = () => {
            const desc = document.getElementById('desc').value;
            const valor = parseFloat(document.getElementById('valor').value);
            const tipo = document.getElementById('tipo').value;

            if (!desc || !valor) return alert("Preencha tudo!");

            const dbRef = ref(db, `usuarios/${currentUser.uid}/gastos`);
            push(dbRef, {
                desc,
                valor,
                tipo,
                data: new Date().toLocaleDateString('pt-BR')
            });

            document.getElementById('desc').value = '';
            document.getElementById('valor').value = '';
        };

        // EXCLUIR GASTO
        window.excluirGasto = (id) => {
            if(confirm("Deseja apagar este registro?")) {
                remove(ref(db, `usuarios/${currentUser.uid}/gastos/${id}`));
            }
        };

        // CARREGAR DADOS EM TEMPO REAL
        function carregarDados() {
            const dbRef = ref(db, `usuarios/${currentUser.uid}/gastos`);
            onValue(dbRef, (snapshot) => {
                const data = snapshot.val();
                renderizarLista(data);
                atualizarResumo(data);
            });
        }

        function renderizarLista(data) {
            const container = document.getElementById('lista-gastos');
            container.innerHTML = '';
            if (!data) return container.innerHTML = '<p class="text-center text-gray-400 py-10">Nenhum gasto registrado.</p>';

            Object.keys(data).reverse().forEach(key => {
                const item = data[key];
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border-l-4 ${getColor(item.tipo)}">
                        <div>
                            <p class="font-bold text-gray-800">${item.desc}</p>
                            <p class="text-[10px] text-gray-400 uppercase font-bold">${item.data} • ${item.tipo}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-blue-600">R$ ${item.valor.toFixed(2)}</p>
                            <button onclick="excluirGasto('${key}')" class="text-red-300 text-xs mt-1 hover:text-red-500 transition">Remover</button>
                        </div>
                    </div>
                `;
            });
        }

        function getColor(tipo) {
            if (tipo === 'Combustível') return 'border-green-500';
            if (tipo === 'Manutenção') return 'border-orange-500';
            if (tipo === 'Lavagem') return 'border-blue-500';
            return 'border-gray-500';
        }

        function atualizarResumo(data) {
            let total = 0;
            const categorias = { 'Combustível': 0, 'Manutenção': 0, 'Lavagem': 0, 'Outros': 0 };

            if (data) {
                Object.values(data).forEach(item => {
                    total += item.valor;
                    categorias[item.tipo] = (categorias[item.tipo] || 0) + item.valor;
                });
            }

            document.getElementById('total-geral').innerText = `R$ ${total.toFixed(2)}`;
            renderChart(categorias);
        }

        function renderChart(categorias) {
            const ctx = document.getElementById('chartGastos').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(categorias),
                    datasets: [{
                        data: Object.values(categorias),
                        backgroundColor: ['#10b981', '#f59e0b', '#3b82f6', '#94a3b8'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    plugins: { 
                        legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 } } }
                    },
                    cutout: '70%'
                }
            });
        }
    </script>
</body>
</html>
